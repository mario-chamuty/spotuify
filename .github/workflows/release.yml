name: Release

# Tag a release to build binaries for all platforms and attach them:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin to 22.04 so the binary links against glibc 2.35, not the much
          # newer glibc on ubuntu-latest. 2.35 covers Ubuntu 22.04+, Debian 12+,
          # Fedora 36+ and other current distros; anyone on those can just run
          # the binary without a glibc upgrade.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: spotuify-${{ github.ref_name }}-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: spotuify-${{ github.ref_name }}-macos-arm64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: spotuify-${{ github.ref_name }}-macos-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: spotuify-${{ github.ref_name }}-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install NASM (aws-lc-sys needs it on Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -C "target/${{ matrix.target }}/release" -czf "${{ matrix.archive }}" spotuify

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/spotuify.exe" -DestinationPath "${{ matrix.archive }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          fail_on_unmatched_files: true
